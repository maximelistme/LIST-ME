<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <title>LIST'ME</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
</head>
<body class="theme-pink">

    <div id="toast-notification" class="toast-hidden"></div>

    <section id="auth-page" style="display: block;">
        <div class="auth-container">
            <h2>LIST'ME</h2>
            <div class="auth-form">
                <label>Adresse E-mail</label>
                <input type="email" id="auth-email" placeholder="votre@email.com">
                <label>Mot de passe</label>
                <input type="password" id="auth-pass" placeholder="••••••••">
                <button id="btn-login" class="btn-primary">Se connecter</button>
                <button id="btn-register" class="btn-secondary">Créer un compte</button>
                <button id="btn-google" class="btn-google" style="margin-top: 10px; width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;">
                    <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" width="18" alt="Google"> Continuer avec Google
                </button>
            </div>
        </div>
    </section>

    <nav id="main-nav" style="display: none;">
        <button id="nav-btn-tasks" class="nav-bubble active" onclick="showPage('tasks')">📋 Tâches</button>
        <button id="nav-btn-todo" class="nav-bubble" onclick="showPage('todo')">⏱️ To-Do</button>
        <button id="nav-btn-calendar" class="nav-bubble" onclick="showPage('calendar')">📅 Calendrier</button>
        <button id="nav-btn-profile" class="nav-bubble" onclick="showPage('profile')">⚙️ Profil</button>
    </nav>

    <main>
        <section id="tasks-page" style="display: none;">
            <div class="header-zone">
                <h2>Mes Tâches</h2>
                <button id="add-task-btn" class="bubble-add">+</button>
            </div>
            <div class="sub-menu">
                <button id="sub-btn-active-tasks" class="sub-menu-tab active" onclick="switchTaskSubView('active')">En cours</button>
                <button id="sub-btn-archived-tasks" class="sub-menu-tab" onclick="switchTaskSubView('archive')">Archives</button>
            </div>

            <div id="archive-search-bar" style="display: none; margin-bottom: 15px; gap: 10px; align-items: center;">
                <label style="font-size: 0.85rem; font-weight: bold; opacity: 0.7; white-space: nowrap;">Filtrer par date :</label>
                <input type="date" id="archive-date-filter" onchange="renderTasks()" style="margin-top: 0; padding: 8px; flex: 1;">
                <button onclick="document.getElementById('archive-date-filter').value = ''; renderTasks();" class="btn-secondary" style="padding: 8px 12px; margin-top: 0; font-size: 0.85rem;">Effacer</button>
            </div>

            <div class="filter-bar" id="tasks-action-bar">
                <select id="task-sort-filter" onchange="renderTasks()">
                    <option value="chrono">Ordre Chronologique</option>
                    <option value="creation">Date de création</option>
                </select>
            </div>
            <div id="task-list" class="list-container"></div>
        </section>

        <section id="todo-page" style="display: none;">
            <div class="header-zone">
                <h2 id="todo-today-date">To-Do List</h2>
                <div style="display:flex; gap:5px;">
                    <button id="btn-daily" class="bubble active" onclick="setTodoMode('daily')">Id</button>
                    <button id="btn-weekly" class="bubble" onclick="setTodoMode('weekly')">Hebdo</button>
                </div>
            </div>
            <div id="todo-content"></div>
        </section>

        <section id="calendar-page" style="display: none;">
            <div class="header-zone">
                <h2 id="calendar-title">Calendrier</h2>
                <div style="display:flex; gap:5px;">
                    <button id="btn-year" class="bubble" onclick="setViewState('year')">Année</button>
                    <button id="btn-month" class="bubble" onclick="setViewState('month')">Mois</button>
                    <button id="btn-day" class="bubble" onclick="setViewState('day')">Jours</button>
                </div>
            </div>
            <div id="calendar-content"></div>
        </section>

        <section id="profile-page" style="display: none;">
            <h2>Mon Profil</h2>
            <div class="profile-card">
                <p>Mon compte : <span id="profile-user-email">...</span></p>
                <label>Mon Surnom</label>
                <input type="text" id="profile-nickname" placeholder="Ex: Max">
                <button id="btn-save-nickname" class="btn-primary" style="margin-top:10px; width:100%;">Enregistrer le surnom</button>
                <hr style="margin:20px 0; opacity:0.2;">
                <label>Thème de l'application</label>
                <div class="theme-selector" style="display:flex; gap:10px; margin-top:10px;">
                    <button class="theme-dot pink" onclick="changeTheme('pink')"></button>
                    <button class="theme-dot blue" onclick="changeTheme('blue')"></button>
                    <button class="theme-dot green" onclick="changeTheme('green')"></button>
                    <button class="theme-dot dark" onclick="changeTheme('dark')"></button>
                </div>
                <button id="btn-logout" class="btn-danger" style="margin-top:30px; width:100%;">Se déconnecter</button>
            </div>
        </section>
    </main>

    <div id="task-modal" class="modal">
        <div class="modal-content">
            <h3 id="modal-title">Nouvelle Tâche</h3>
            <label>Nom de la tâche</label>
            <input type="text" id="task-name" placeholder="Ex: Faire les courses">
            <label>Date</label>
            <input type="date" id="task-date">
            <label>Heure (Optionnel)</label>
            <input type="time" id="task-time">
            
            <label>Rappels automatiques</label>
            <div style="display:flex; gap:5px; flex-wrap:wrap; margin-top:5px;">
                <span class="reminder-badge" data-value="10">10 min</span>
                <span class="reminder-badge" data-value="30">30 min</span>
                <span class="reminder-badge" data-value="60">1h</span>
                <span class="reminder-badge" data-value="1440">1 jour</span>
            </div>

            <label style="margin-top:10px;">Importance</label>
            <select id="task-importance">
                <option value="low">Faible</option>
                <option value="medium" selected>Moyenne</option>
                <option value="high">Haute</option>
            </select>
            <div class="modal-buttons">
                <button id="save-task" class="btn-primary">Enregistrer</button>
                <button id="close-modal" class="btn-secondary">Annuler</button>
            </div>
        </div>
    </div>

    <div id="todo-modal" class="modal">
        <div class="modal-content">
            <h3 id="todo-modal-title">Ajouter à la To-Do</h3>
            <div id="todo-day-selector-block" style="display:none; flex-direction:column; gap:5px; margin-bottom:10px;">
                <label>Jour de la semaine</label>
                <select id="todo-day-select">
                    <option value="1">Lundi</option>
                    <option value="2">Mardi</option>
                    <option value="3">Mercredi</option>
                    <option value="4">Jeudi</option>
                    <option value="5">Vendredi</option>
                    <option value="6">Samedi</option>
                    <option value="0">Dimanche</option>
                </select>
            </div>
            <label>Heure</label>
            <input type="time" id="todo-time">
            <label>Activité</label>
            <input type="text" id="todo-task-name" placeholder="Ex: Séance de sport">
            <div class="modal-buttons" style="display:flex; gap:10px; margin-top:15px;">
                <button id="save-todo" class="btn-primary" style="flex:1;">Ajouter</button>
                <button id="close-todo-modal" class="btn-secondary" style="flex:1;">Annuler</button>
            </div>
        </div>
    </div>

    <div id="calendar-day-modal" class="modal">
        <div class="modal-content">
            <h3 id="cal-modal-date-title" style="margin-bottom:10px; color:var(--primary);">...</h3>
            <div id="cal-modal-tasks-container" style="display:flex; flex-direction:column; gap:8px; max-height:250px; overflow-y:auto; padding:5px 0;"></div>
            <button onclick="document.getElementById('calendar-day-modal').style.display='none'" class="btn-secondary" style="margin-top:10px; width:100%;">Fermer</button>
        </div>
    </div>

    <div id="welcome-modal" class="modal">
        <div class="modal-content" style="max-width:420px; text-align:center; padding:25px;">
            <h3 id="welcome-message-text" style="font-size:1.4rem; color:var(--primary); margin-bottom:5px;">Welcome back ! 👋</h3>
            <div id="today-summary-zone" style="margin-top:15px; background:rgba(0,0,0,0.02); padding:12px; border-radius:15px; max-height:200px; overflow-y:auto;"></div>
            <button onclick="document.getElementById('welcome-modal').style.display='none'" class="btn-primary" style="margin-top:20px; width:100%; box-shadow:0 4px 10px var(--primary);">C'est parti ! 🚀</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
